name: CD

on:
  workflow_run:
    workflows: [CI-iOS]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deliver:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Archive the iOS app
        run: |
          xcodebuild archive \
            -project CountryQAApp/CountryQAApp.xcodeproj \
            -scheme CountryQAApp \
            -destination 'generic/platform=iOS' \
            -archivePath build/CountryQAApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package the CLI with the framework it loads at runtime
        run: |
          xcodebuild build \
            -project CountryQAApp/CountryQAApp.xcodeproj \
            -scheme CountryQACLI \
            -configuration Release \
            -destination 'platform=macOS' \
            CONFIGURATION_BUILD_DIR="$PWD/build/cli"

          mkdir -p build/CountryQACLI-macos
          cp build/cli/CountryQACLI build/CountryQACLI-macos/
          cp -R build/cli/CountryQA.framework build/CountryQACLI-macos/

      - name: Upload the iOS archive
        uses: actions/upload-artifact@v7
        with:
          name: CountryQAApp-xcarchive
          path: build/CountryQAApp.xcarchive

      - name: Upload the runnable CLI
        uses: actions/upload-artifact@v7
        with:
          name: CountryQACLI-macos
          path: build/CountryQACLI-macos
